<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json" >
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <title>Budget Tracker - Core</title>
    <style>
        :root {
            --b-dark: #0a0a0a;
            --b-panel: #141414;
            --orange: #ff6600;
            --orange-glow: rgba(255, 102, 0, 0.4);
            --text-gray: #a0a0a0;
        }

        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background: var(--b-dark);
            color: #fff;
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }
        
        .c { 
            background: var(--b-panel); 
            padding: 30px; 
            border-radius: 4px; 
            width: 100%;
            max-width: 380px; 
            border: 1px solid #222;
            border-top: 4px solid var(--orange);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.8);
            position: relative;
        }

        .c::before {
            content: "SYSTEM_ACTIVE";
            position: absolute;
            top: -25px;
            right: 0;
            font-size: 0.6rem;
            color: var(--orange);
            letter-spacing: 2px;
        }

        h3 { 
            text-align: left; 
            font-size: 0.75rem; 
            color: var(--text-gray);
            letter-spacing: 2px;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .amt-display {
            font-weight: 900;
            font-size: 3rem;
            text-align: left;
            margin-bottom: 25px;
            color: #fff;
            text-shadow: 0 0 15px var(--orange-glow);
        }

        .peso-sign { font-size: 1.8rem; color: var(--orange); margin-right: 5px; }

        input { 
            width: 100%; 
            box-sizing: border-box;
            margin-bottom: 12px; 
            padding: 14px; 
            background: #000;
            border: 1px solid #333; 
            border-radius: 4px;
            color: var(--orange);
            outline: none;
            transition: 0.3s;
            font-size: 1rem;
        }

        input:focus { border-color: var(--orange); box-shadow: 0 0 10px var(--orange-glow); }

        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

        button { 
            padding: 14px; 
            background: var(--orange); 
            color: #000; 
            border: none; 
            border-radius: 2px;
            cursor: pointer; 
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            clip-path: polygon(0 0, 100% 0, 95% 100%, 5% 100%);
            transition: 0.2s;
        }

        button:hover { 
            background: #fff;
            transform: scale(1.02);
            box-shadow: 0 0 20px var(--orange-glow);
        }

        .clr { 
            background: transparent; 
            color: var(--text-gray); 
            border: 1px solid #333;
            clip-path: none; 
        }

        .clr:hover { color: #ff3333; border-color: #ff3333; background: rgba(255, 0, 0, 0.05); }

        ul { list-style: none; padding: 0; margin-top: 30px; }

        li { 
            padding: 14px; 
            background: rgba(255, 255, 255, 0.02);
            border-bottom: 1px solid #222;
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            transition: 0.3s;
        }

        li:hover { background: rgba(255, 102, 0, 0.05); }

        .item-row { display: flex; align-items: center; gap: 10px; font-weight: 500; color: #ddd; }
        .item-row i { color: var(--orange); font-size: 0.8rem; }

        .amt-row { font-weight: 700; color: #fff; }
        
        .r { color: #444; cursor: pointer; margin-left: 10px; transition: 0.2s; }
        .r:hover { color: var(--orange); transform: rotate(90deg); }

        @media (max-width: 400px) {
            .btn-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="c">
    <h3> EXPENSE_LOG</h3>
    <div class="amt-display"><span class="peso-sign">&#8369;</span><span id="t">0.00</span></div>
    
    <input type="text" id="k" placeholder="ITEM_ID">
    <input type="number" id="v" placeholder="0.00">

    <div class="btn-grid">
        <button onclick="fn_a()"><i class="fas fa-bolt"></i> ADD</button>
        <button class="clr" onclick="fn_c()">REMOVE</button>
    </div>

    <ul id="l"></ul>
</div>

<script>
    const _U = "https://uyhdoyzavxctuonnlttb.supabase.co"; 
    const _K = "sb_publishable_IfbS1_PvjhrylYzMF4YrtA_mUj8Q2fJ"; 
    const db = supabase.createClient(_U, _K);

    const _t = document.getElementById('t');
    const _l = document.getElementById('l');
    const _k = document.getElementById('k');
    const _v = document.getElementById('v');

    async function fn_s() {
        let { data: rs, error: err } = await db.from('budget_db').select('*');
        if (err) return;

        _l.innerHTML = "";
        let total = 0;
        rs.forEach(i => {
            total += i.amount;
            let row = document.createElement('li');
            row.innerHTML = `
                <div class="item-row"><i class="fas fa-chevron-right"></i> ${i.item}</div> 
                <div class="amt-row">
                    &#8369;${i.amount.toFixed(2)} 
                    <i class="fas fa-plus r" style="transform: rotate(45deg);" onclick="fn_x(${i.id})"></i>
                </div>
            `;
            _l.appendChild(row);
        });
        _t.innerText = total.toLocaleString(undefined, {minimumFractionDigits: 2});
    }

    async function fn_a() {
        let n = _k.value;
        let p = parseFloat(_v.value);
        if (n && p > 0) {
            await db.from('budget_db').insert([{ item: n, amount: p }]);
            fn_s(); 
            _k.value = ''; _v.value = '';
        }
    }

    async function fn_x(id) {
        await db.from('budget_db').delete().eq('id', id);
        fn_s();
    }

    async function fn_c() {
        if(confirm("Are you Sure?!!")) {
            await db.from('budget_db').delete().neq('id', 0);
            fn_s();
        }
    }

    fn_s();

    if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("/service-worker.js")
        .then(() => console.log("OK na "))
        .catch((e) => console.log(e));
    }
</script>

</body>
</html>
