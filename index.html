<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json" >
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <title>Budget Tracker - Core</title>
    <style>
        :root {
            --b-dark: #0a0a0a;
            --b-panel: #141414;
            --orange: #ff6600;
            --orange-glow: rgba(255, 102, 0, 0.4);
            --text-gray: #a0a0a0;
            --neon-blue: #00f2ff;
        }

        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background: var(--b-dark);
            color: #fff;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }
        
        .c { 
            background: var(--b-panel); 
            padding: 30px; 
            border-radius: 4px; 
            width: 100%;
            max-width: 380px; 
            border: 1px solid #222;
            border-top: 4px solid var(--orange);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.8);
            position: relative;
            margin-bottom: 20px;
        }

        .c::before {
            content: "SYSTEM_ACTIVE";
            position: absolute;
            top: -25px;
            right: 0;
            font-size: 0.6rem;
            color: var(--orange);
            letter-spacing: 2px;
        }

        h3 { 
            text-align: left; 
            font-size: 0.75rem; 
            color: var(--text-gray);
            letter-spacing: 2px;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .amt-display {
            font-weight: 900;
            font-size: 3rem;
            text-align: left;
            margin-bottom: 10px;
            color: #fff;
            text-shadow: 0 0 15px var(--orange-glow);
        }

        .wallet-display {
            font-size: 0.9rem;
            color: var(--neon-blue);
            margin-bottom: 20px;
            font-family: monospace;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .edit-wallet {
            cursor: pointer;
            font-size: 0.8rem;
            opacity: 0.6;
            transition: 0.3s;
        }

        .edit-wallet:hover { opacity: 1; color: #fff; }

        .peso-sign { font-size: 1.8rem; color: var(--orange); margin-right: 5px; }

        input { 
            width: 100%; 
            box-sizing: border-box;
            margin-bottom: 12px; 
            padding: 14px; 
            background: #000;
            border: 1px solid #333; 
            border-radius: 4px;
            color: var(--orange);
            outline: none;
            transition: 0.3s;
            font-size: 1rem;
        }

        input:focus { border-color: var(--orange); box-shadow: 0 0 10px var(--orange-glow); }

        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 10px; }

        button { 
            padding: 14px; 
            background: var(--orange); 
            color: #000; 
            border: none; 
            border-radius: 2px;
            cursor: pointer; 
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            clip-path: polygon(0 0, 100% 0, 95% 100%, 5% 100%);
            transition: 0.2s;
        }

        button:hover { 
            background: #fff;
            transform: scale(1.02);
            box-shadow: 0 0 20px var(--orange-glow);
        }

        .clr { 
            background: transparent; 
            color: var(--text-gray); 
            border: 1px solid #333;
            clip-path: none; 
        }

        .clr:hover { color: #ff3333; border-color: #ff3333; background: rgba(255, 0, 0, 0.05); }

        .advisory-box {
            background: #000;
            border: 1px solid var(--neon-blue);
            padding: 15px;
            font-size: 0.85rem;
            color: var(--neon-blue);
            margin-top: 20px;
            border-radius: 4px;
            line-height: 1.4;
        }

        .report-section {
            margin-top: 20px;
            border-top: 1px solid #333;
            padding-top: 15px;
        }

        ul { list-style: none; padding: 0; margin-top: 10px; }

        li { 
            padding: 14px; 
            background: rgba(255, 255, 255, 0.02);
            border-bottom: 1px solid #222;
            display: flex; 
            justify-content: space-between; 
            align-items: center;
        }

        .item-row { display: flex; align-items: center; gap: 10px; font-weight: 500; color: #ddd; }
        .item-row i { color: var(--orange); font-size: 0.8rem; }
        .amt-row { font-weight: 700; color: #fff; }
        .r { color: #444; cursor: pointer; margin-left: 10px; transition: 0.2s; }
        .r:hover { color: var(--orange); transform: rotate(90deg); }
    </style>
</head>
<body>

<div class="c">
    <h3> WALLET_BALANCE</h3>
    <div class="wallet-display">
        <span>CREDITS: &#8369;<span id="w_bal">0.00</span></span>
        <i class="fas fa-edit edit-wallet" onclick="updateWalletBase()" title="Update Credits"></i>
    </div>

    <h3> TOTAL_EXPENSES</h3>
    <div class="amt-display"><span class="peso-sign">&#8369;</span><span id="t">0.00</span></div>
    
    <input type="text" id="k" placeholder="ITEM_ID">
    <input type="number" id="v" placeholder="0.00">

    <div class="btn-grid">
        <button onclick="fn_a()"><i class="fas fa-bolt"></i> ADD</button>
        <button class="clr" onclick="fn_c()">RESET</button>
    </div>

    <div id="adv" class="advisory-box">
        <i class="fas fa-microchip"></i> SYSTEM_READY...
    </div>

    <div class="report-section">
        <h3> TRANSACTION_HISTORY</h3>
        <ul id="l"></ul>
    </div>
</div>

<script>
    const _U = "https://uyhdoyzavxctuonnlttb.supabase.co"; 
    const _K = "sb_publishable_IfbS1_PvjhrylYzMF4YrtA_mUj8Q2fJ"; 
    const db = supabase.createClient(_U, _K);

    const _t = document.getElementById('t');
    const _l = document.getElementById('l');
    const _k = document.getElementById('k');
    const _v = document.getElementById('v');
    const _w = document.getElementById('w_bal');
    const _adv = document.getElementById('adv');


    let walletBase = parseFloat(localStorage.getItem('wallet_base')) || 10000.00;

    function updateWalletBase() {
        let newVal = prompt("ENTER NEW WALLET CREDIT AMOUNT:", walletBase);
        if (newVal !== null && !isNaN(newVal)) {
            walletBase = parseFloat(newVal);
            localStorage.setItem('wallet_base', walletBase);
            fn_s(); 
        }
    }

    async function fn_s() {
        let { data: rs, error: err } = await db.from('budget_db').select('*');
        
        if (err) {
            rs = JSON.parse(localStorage.getItem('cached_expenses')) || [];
        } else {
            localStorage.setItem('cached_expenses', JSON.stringify(rs));
        }

        _l.innerHTML = "";
        let total = 0;
        rs.forEach(i => {
            total += i.amount;
            let row = document.createElement('li');
            row.innerHTML = `
                <div class="item-row"><i class="fas fa-chevron-right"></i> ${i.item}</div> 
                <div class="amt-row">
                    &#8369;${i.amount.toFixed(2)} 
                    <i class="fas fa-plus r" style="transform: rotate(45deg);" onclick="fn_x(${i.id})"></i>
                </div>
            `;
            _l.appendChild(row);
        });
        
        _t.innerText = total.toLocaleString(undefined, {minimumFractionDigits: 2});
        _w.innerText = (walletBase - total).toLocaleString(undefined, {minimumFractionDigits: 2});
        
        updateAdvisory(total, walletBase);
    }

    async function fn_a() {
        let n = _k.value;
        let p = parseFloat(_v.value);
        if (n && p > 0) {
            await db.from('budget_db').insert([{ item: n, amount: p }]);
            fn_s(); 
            _k.value = ''; _v.value = '';
        }
    }

    async function fn_x(id) {
        await db.from('budget_db').delete().eq('id', id);
        fn_s();
    }

    async function fn_c() {
        if(confirm("DANGER: This will wipe all logs. Proceed?")) {
            await db.from('budget_db').delete().neq('id', 0);
            fn_s();
        }
    }

    function updateAdvisory(total, wallet) {
        const usagePercent = (total / wallet) * 100;
        let msg = "";
        if (usagePercent > 90) msg = "CRITICAL: Funds depleted. Stop all spending.";
        else if (usagePercent > 70) msg = "WARNING: Burn rate high. Suggest extreme frugality.";
        else msg = "SYSTEM: Budget health optimal.";
        _adv.innerHTML = `<i class="fas fa-microchip"></i> ANALYSIS: ${msg}`;
    }

    fn_s();

    if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("/service-worker.js")
        .catch((e) => console.log(e));
    }
</script>

</body>
</html>
